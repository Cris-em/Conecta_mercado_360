<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConectaMercado 360 — Mi Puesto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <style>
        :root { --rosa-mexicano: #FF1493; --morado-intenso: #4A0080; --amarillo-vibrante: #FFC400; --blanco: #ffffff; --cafe-oscuro: #2e1a30; }
        body {
            background-image: url("/static/imagenes/fondo_axolotl.png"); background-size: cover; background-attachment: fixed; background-position: center;
            position: relative; font-family: 'Poppins', sans-serif;
        }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.85); z-index: -1; }
        .app-layout { display: flex; min-height: 100vh; }
        
        .sidebar { width: 230px; background: var(--morado-intenso); backdrop-filter: blur(12px); padding: 24px 16px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; border-right: 2px solid var(--rosa-mexicano); }
        .sidebar-logo { font-family: 'Poppins'; font-size: 1.4rem; font-weight: 800; color: #f9f7e1; text-align: center; margin-bottom: 30px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.15); }
        .sidebar-item { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.8); text-decoration: none; padding: 10px 14px; border-radius: 40px; font-weight: 500; margin-bottom: 8px; transition: all 0.25s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: var(--rosa-mexicano); color: white; transform: translateX(4px); }
        .sidebar-item i { font-size: 1.2rem; }

        .main-content { flex: 1; padding: 28px; max-width: calc(100% - 230px); }
        .page-title { font-size: 1.8rem; font-weight: 700; color: var(--morado-intenso); margin-bottom: 1.5rem; border-left: 6px solid var(--rosa-mexicano); padding-left: 1rem; }

        /* Formulario */
        .form-card { background: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 2rem; border: 1px solid #F0E6F6; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-weight: 600; color: var(--morado-intenso); margin-bottom: 0.3rem; }
        input, textarea { width: 100%; padding: 0.7rem; border: 1px solid var(--rosa-mexicano); border-radius: 50px; font-family: 'Poppins'; transition: 0.2s; }
        textarea { border-radius: 1rem; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: var(--rosa-mexicano); box-shadow: 0 0 0 3px rgba(255,20,147,0.2); }
        .file-label { background: #F0E6F6; padding: 0.5rem 1rem; border-radius: 40px; cursor: pointer; color: var(--morado-intenso); display: inline-block; }
        .btn-submit { background: var(--rosa-mexicano); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: var(--amarillo-vibrante); color: var(--cafe-oscuro); transform: scale(1.02); }

        /* Mis Locales */
        .locales-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; }
        .local-card { background: white; border-radius: 1.2rem; width: 280px; overflow: hidden; box-shadow: 0 5px 12px rgba(0,0,0,0.05); border: 1px solid #F0E6F6; transition: 0.3s; }
        .local-card:hover { transform: translateY(-5px); border-color: var(--rosa-mexicano); }
        .local-img { width: 100%; height: 160px; object-fit: cover; background: #f0f0f0; }
        .local-info { padding: 1rem; }
        .local-name { font-size: 1.1rem; font-weight: 700; color: var(--cafe-oscuro); }
        .local-desc { color: #6f6f6f; font-size: 0.85rem; margin-bottom: 0.5rem; }

        @media (max-width: 750px) { .app-layout { flex-direction: column; } .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 2px solid var(--rosa-mexicano); } .sidebar-logo { display: none; } .main-content { max-width: 100%; } }
    </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">🦎 CM360<br><small style="font-size:0.7rem;">Vendedor</small></div>
    <a href="/vendedor/inicio" class="sidebar-item active"><i class="fas fa-home"></i> Mi Puesto</a>
    <a href="/vendedor/subir-producto" class="sidebar-item"><i class="fas fa-upload"></i> Subir Producto</a>
    <a href="/vendedor/stock" class="sidebar-item"><i class="fas fa-boxes"></i> Mi Stock</a>
    <a href="/vendedor/ventas" class="sidebar-item"><i class="fas fa-chart-line"></i> Mis Ventas</a>
    <a href="/vendedor/perfil" class="sidebar-item"><i class="fas fa-user-circle"></i> Mi Perfil</a>
    <div style="flex:1"></div>
    <a href="/" class="sidebar-item" style="border-top:1px solid rgba(255,255,255,0.15);padding-top:16px;"><i class="fas fa-exchange-alt"></i> Cambiar Rol</a>
  </aside>

  <main class="main-content">
    <!-- Título -->
    <div class="page-title"><i class="fas fa-store"></i> Administra tu Puesto</div>

    <!-- Formulario para Crear Local -->
    <div class="form-card">
        <h3 style="color: var(--morado-intenso); margin-bottom: 1rem;"><i class="fas fa-plus-circle" style="color: var(--rosa-mexicano);"></i> Crear un nuevo local / puesto</h3>
        <form id="formCrearLocal" enctype="multipart/form-data">
            <div class="form-group">
                <label>Nombre del local *</label>
                <input type="text" id="nombreLocal" placeholder="Ej. Frutería de la esquina" required>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea rows="2" id="descLocal" placeholder="Cuéntales a los compradores qué vendes..."></textarea>
            </div>
            <div class="form-group">
                <label>Foto del puesto</label>
                <input type="file" name="imagenLocal" id="imagenLocal" accept="image/*" required>
                <small class="file-label" onclick="document.getElementById('imagenLocal').click()">📁 Seleccionar foto</small>
            </div>
            <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Guardar mi puesto</button>
        </form>
    </div>

    <!-- Mis Locales -->
    <div class="page-title" style="margin-top: 2rem;">Mis puestos</div>
    <div id="misLocalesContainer" class="locales-grid">
        <!-- Aquí se renderizarán los locales del vendedor -->
        <p style="color: #6f6f6f;">Cargando tus puestos...</p>
    </div>
  </main>
</div>

<script>
    const userId = localStorage.getItem('userId');

    // Cargar Mis Locales
    async function cargarMisLocales() {
        try {
            const res = await fetch('/api/datos_mercado');
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            // Filtramos solo los locales que pertenecen a este usuario
            const misLocales = data.locales.filter(l => l.usuario_id == userId);
            const container = document.getElementById('misLocalesContainer');

            if (misLocales.length === 0) {
                container.innerHTML = '<p style="color: #6f6f6f; width:100%; text-align:center; padding:2rem;">Aún no has creado ningún puesto. ¡Usa el formulario de arriba!</p>';
                return;
            }

            container.innerHTML = misLocales.map(l => `
                <div class="local-card">
                    <img src="${l.imagen_local || 'https://via.placeholder.com/280x160?text=Sin+Imagen'}" class="local-img" alt="${l.nombre}">
                    <div class="local-info">
                        <div class="local-name">🏪 ${l.nombre}</div>
                        <div class="local-desc">${l.descripcion || 'Sin descripción'}</div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error("Error cargando locales:", error);
        }
    }

    // Enviar formulario para crear local
    document.getElementById('formCrearLocal').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Verificar si está logueado
        if (!userId) {
            alert("⚠️ No has iniciado sesión. Serás redirigido al inicio.");
            window.location.href = '/';
            return;
        }

        const formData = new FormData();
        formData.append('usuario_id', userId);
        formData.append('nombre_local', document.getElementById('nombreLocal').value);
        formData.append('descripcion', document.getElementById('descLocal').value);
        
        // Verificar si se seleccionó un archivo antes de añadirlo
        const archivo = document.getElementById('imagenLocal').files[0];
        if (archivo) {
            formData.append('imagen_local', archivo);
        }

        try {
            const res = await fetch('/api/agregar_local', { method: 'POST', body: formData });
            const json = await res.json();
            
            if (json.success) {
                alert('¡Local creado exitosamente!');
                document.getElementById('formCrearLocal').reset();
                cargarMisLocales();
            } else {
                // Esto mostrará el error exacto que devuelva el servidor
                alert('Error del servidor: ' + json.error);
            }
        } catch (e) {
            console.error("Error de red:", e);
            alert("❌ Error de conexión con el servidor. Revisa que XAMPP esté encendido y mira la terminal de VS Code para ver el error exacto.");
        }
    });

    cargarMisLocales();
                <a href="/admin" style="background: #FFC400; color: #2e1a30; padding: 0.2rem 1rem; border-radius: 40px; font-weight:700;"><i class="fas fa-crown"></i> Admin</a>
</script>
</body>
</html>
